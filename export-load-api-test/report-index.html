<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Export API — k6 Load/Stress Report</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0b0b0f;
    color: #e5e7eb;
    margin: 0;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: #0b0b0f;
    border-bottom: 1px solid #27272a;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  nav { display: flex; gap: 8px; }
  nav a {
    color: #a5b4fc;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #27272a;
    transition: background 0.15s, color 0.15s;
  }
  nav a:hover { background: #1f1f23; color: #fff; }
  section { padding: 24px 24px 0; }
  section .label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 10px;
  }
  iframe {
    width: 100%;
    border: 1px solid #27272a;
    border-radius: 10px;
    display: block;
    /* Sized via JS once the report inside finishes loading; this is just a
       sane starting height so the layout doesn't jump while it loads. */
    height: 480px;
  }
  footer { padding: 32px 24px; }
</style>
</head>
<body>
  <header>
    <h1>Export API — k6 Load/Stress Report</h1>
    <nav>
      <a href="#load">Load test</a>
      <a href="#stress">Stress test</a>
    </nav>
  </header>

  <section id="load">
    <p class="label">01 · Load test</p>
    <iframe src="load-report.html" onload="autoSize(this)"></iframe>
  </section>

  <section id="stress">
    <p class="label">02 · Stress test</p>
    <iframe src="stress-report.html" onload="autoSize(this)"></iframe>
  </section>

  <footer></footer>

  <script>
    // Both reports are static, same-origin files served alongside this page,
    // so we can read their rendered height directly and grow the iframe to
    // fit — avoids the nested-scrollbar, content-gets-cut-off problem of a
    // fixed-height iframe.
    function autoSize(iframe) {
      try {
        const height = iframe.contentDocument.documentElement.scrollHeight;
        iframe.style.height = height + 40 + "px";
      } catch (e) {
        // Cross-origin or load failure — keep the fallback height.
      }
    }
  </script>
</body>
</html>
