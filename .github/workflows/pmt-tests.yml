name: PMT Tests

# Non-default test types append " [type]", automated (non-dashboard) triggers
# append " (CI/CD)", and single-test runs append the filter after " — ", so
# the dashboard can tell apart a full frontend suite run from an api/load run,
# a CI/CD-triggered run, or a single-test run. Defaults → just "PMT Tests".
run-name: PMT Tests${{ (inputs.type != '' && inputs.type != 'frontend') && format(' [{0}]', inputs.type) || '' }}${{ inputs.triggered_by == 'gitlab-deploy' && ' (CI/CD)' || '' }}${{ inputs.test_filter && format(' — {0}', inputs.test_filter) || '' }}

on:
  # Daily full-suite run. GitHub cron is in UTC; 05:00 UTC = 10:00 Asia/Tashkent
  # (UTC+5, no DST). Scheduled runs only fire from the default branch (main) and
  # pass no test_filter, so the whole suite runs.
  schedule:
    - cron: "0 5 * * *"
  # Manual — runs are also triggered from the dashboard "Run" button
  # (workflow_dispatch).
  workflow_dispatch:
    inputs:
      type:
        description: "Test type to run"
        required: false
        default: "frontend"
        type: choice
        options:
          - frontend
          - api
          - load
      test_filter:
        description: >-
          Optional Playwright filter to run a single test, e.g.
          "tests/pmt/login.spec.ts:5". Empty runs the whole suite.
        required: false
        default: ""
      triggered_by:
        description: >-
          Internal — set to "gitlab-deploy" by the GitLab deploy pipeline's
          automated trigger. Leave as "manual" when running from the dashboard.
        required: false
        default: "manual"
        type: string
      dashboard_user:
        description: >-
          Internal — set automatically by the dashboard's trigger API to the
          username of whoever clicked Run, so the Telegram notification can
          say who ran it. Leave empty when running from the GitHub UI directly.
        required: false
        default: ""
        type: string

env:
  # Origin only — the login test appends "/login" itself.
  PMT_BASE_URL: https://testpmt.miit.uz

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run PMT tests
        env:
          PMT_USERNAME: ${{ secrets.PMT_USERNAME }}
          PMT_PASSWORD: ${{ secrets.PMT_PASSWORD }}
          PMT_API_BASE_URL: https://testpmt.miit.uz/api
          TYPE: ${{ inputs.type }}
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          case "${TYPE:-frontend}" in
            load)
              echo "Load (K6) tests are not configured yet for PMT." >&2
              exit 1 ;;
            api)
              if [ -n "$TEST_FILTER" ]; then
                echo "Running selected API tests: $TEST_FILTER"
                npx playwright test --project=pmt-api $TEST_FILTER
              else
                npx playwright test --project=pmt-api
              fi ;;
            *)
              if [ -n "$TEST_FILTER" ]; then
                echo "Running selected tests: $TEST_FILTER"
                npx playwright test --project=pmt $TEST_FILTER
              else
                npx playwright test --project=pmt
              fi ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pmt
          path: playwright-tests/playwright-report/
          retention-days: 7

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
          DASHBOARD_USER: ${{ inputs.dashboard_user }}
          TYPE_RAW: ${{ inputs.type }}
          TEST_FILTER_RAW: ${{ inputs.test_filter }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            cancelled) EMOJI="⚠️" ;;
            *) EMOJI="ℹ️" ;;
          esac
          if [ "$EVENT_NAME" = "schedule" ]; then
            TRIGGER_LINE="Scheduled (daily cron)"
          elif [ "${TRIGGERED_BY:-manual}" = "gitlab-deploy" ]; then
            TRIGGER_LINE="CI/CD (GitLab deploy)"
          elif [ -n "$DASHBOARD_USER" ]; then
            TRIGGER_LINE="Manual — ${DASHBOARD_USER}"
          else
            TRIGGER_LINE="Manual"
          fi
          TEST_TYPE="${TYPE_RAW:-frontend}"
          TEST_DISPLAY="${TEST_FILTER_RAW:-Full suite}"
          TEXT="$(printf '%s <b>PMT Tests</b> #%s\nResult: <b>%s</b>\nType: <code>%s</code>\nTest: <code>%s</code>\nTriggered by: %s\nBranch: <code>%s</code>\n%s' \
            "$EMOJI" "$RUN_NUMBER" "$STATUS" "$TEST_TYPE" "$TEST_DISPLAY" "$TRIGGER_LINE" "$BRANCH" "$RUN_URL")"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
