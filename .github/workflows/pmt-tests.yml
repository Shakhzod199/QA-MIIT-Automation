name: PMT Tests

# Non-default test types append " [type]", automated (non-dashboard) triggers
# append " (CI/CD)", and single-test runs append the filter after " — ", so
# the dashboard can tell apart a full frontend suite run from an api/load run,
# a CI/CD-triggered run, or a single-test run. Defaults → just "PMT Tests".
run-name: PMT Tests${{ (inputs.type != '' && inputs.type != 'frontend') && format(' [{0}]', inputs.type) || '' }}${{ inputs.triggered_by == 'gitlab-deploy' && ' (CI/CD)' || '' }}${{ inputs.test_filter && format(' — {0}', inputs.test_filter) || '' }}

on:
  # PMT is disabled (server-side login is broken on testpmt.miit.uz — see
  # lib/disabledSuites.ts) — the daily cron schedule is removed so it stops
  # firing on its own. The dashboard "Run" button is also disabled for this
  # suite. workflow_dispatch is kept dispatchable (GitHub requires at least
  # one trigger) but the job below exits immediately regardless of inputs.
  workflow_dispatch:
    inputs:
      type:
        description: "Test type to run"
        required: false
        default: "frontend"
        type: choice
        options:
          - frontend
          - api
          - load
      test_filter:
        description: >-
          Optional Playwright filter to run a single test, e.g.
          "tests/pmt/login.spec.ts:5". Empty runs the whole suite.
        required: false
        default: ""
      triggered_by:
        description: >-
          Internal — set to "gitlab-deploy" by the GitLab deploy pipeline's
          automated trigger. Leave as "manual" when running from the dashboard.
        required: false
        default: "manual"
        type: string

env:
  # Origin only — the login test appends "/login" itself.
  PMT_BASE_URL: https://testpmt.miit.uz

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright-tests
    steps:
      - name: PMT disabled — server-side login is broken
        run: |
          echo "PMT testing is disabled until testpmt.miit.uz's login is fixed server-side." >&2
          echo "Re-enable in .github/workflows/pmt-tests.yml and lib/disabledSuites.ts once resolved." >&2
          exit 1

      - uses: actions/checkout@v4
        if: false

      - uses: actions/setup-node@v4
        if: false
        with:
          node-version: 20

      - run: npm ci
        if: false

      - run: npx playwright install --with-deps chromium
        if: false

      - name: Run PMT tests
        if: false
        env:
          PMT_USERNAME: ${{ secrets.PMT_USERNAME }}
          PMT_PASSWORD: ${{ secrets.PMT_PASSWORD }}
          TYPE: ${{ inputs.type }}
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          # Branch on the test type. frontend is the default and keeps the
          # current behaviour; api/load are placeholders until those suites
          # exist (they fail loudly so a premature dispatch is obvious).
          case "${TYPE:-frontend}" in
            load)
              echo "Load (K6) tests are not configured yet for PMT." >&2
              exit 1 ;;
            api)
              echo "API smoke tests are not configured yet for PMT." >&2
              exit 1 ;;
            *)
              if [ -n "$TEST_FILTER" ]; then
                # TEST_FILTER may hold several space-separated filters (multi-
                # select in the dashboard). Leave it unquoted so each becomes its
                # own positional arg; Playwright runs any test matching any.
                echo "Running selected tests: $TEST_FILTER"
                npx playwright test --project=pmt $TEST_FILTER
              else
                npx playwright test --project=pmt
              fi ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-pmt
          path: playwright-tests/playwright-report/
          retention-days: 7

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            cancelled) EMOJI="⚠️" ;;
            *) EMOJI="ℹ️" ;;
          esac
          TEXT="$(printf '%s <b>PMT Tests</b> #%s\nResult: <b>%s</b>\nBranch: <code>%s</code>\n%s' \
            "$EMOJI" "$RUN_NUMBER" "$STATUS" "$BRANCH" "$RUN_URL")"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
