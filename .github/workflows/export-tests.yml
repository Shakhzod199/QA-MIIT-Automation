name: Export Tests

on:
  # Manual only — runs are triggered from the dashboard "Run" button
  # (workflow_dispatch). No automatic run on push.
  workflow_dispatch:

env:
  BASE_URL: https://export.miit.uz

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run export tests
        env:
          EXPORT_USERNAME: ${{ secrets.EXPORT_USERNAME }}
          EXPORT_PASSWORD: ${{ secrets.EXPORT_PASSWORD }}
        run: npx playwright test tests/export

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
          retention-days: 7

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            cancelled) EMOJI="⚠️" ;;
            *) EMOJI="ℹ️" ;;
          esac
          TEXT="$(printf '%s <b>Export Tests</b> #%s\nResult: <b>%s</b>\nBranch: <code>%s</code>\n%s' \
            "$EMOJI" "$RUN_NUMBER" "$STATUS" "$BRANCH" "$RUN_URL")"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
