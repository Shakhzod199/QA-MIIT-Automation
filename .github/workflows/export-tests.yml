name: export Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "playwright-tests/tests/export/**"
      - "playwright-tests/playwright.config.ts"
      - ".github/workflows/export-tests.yml"

env:
  BASE_URL: https://export.miit.uz

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test tests/export

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: playwright-tests/allure-report/
          retention-days: 14
