name: export Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "playwright-tests/tests/export/**"
      - "playwright-tests/playwright.config.ts"
      - ".github/workflows/export-tests.yml"

env:
  BASE_URL: https://export.miit.uz

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test tests/export

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
          retention-days: 7
