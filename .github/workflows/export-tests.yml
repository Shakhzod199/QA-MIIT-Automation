name: Export Tests

# Single-test runs append the filter after " — " so the dashboard can tell them
# apart from a full-suite run. Empty filter → just "Export Tests".
run-name: Export Tests${{ inputs.test_filter && format(' — {0}', inputs.test_filter) || '' }}

on:
  # Daily full-suite run. GitHub cron is in UTC; 05:00 UTC = 10:00 Asia/Tashkent
  # (UTC+5, no DST). Scheduled runs only fire from the default branch (main) and
  # pass no test_filter, so the whole suite runs.
  schedule:
    - cron: "0 5 * * *"
  # Manual — runs are also triggered from the dashboard "Run" button
  # (workflow_dispatch).
  workflow_dispatch:
    inputs:
      type:
        description: "Test type to run: frontend | api | load"
        required: false
        default: "frontend"
      test_filter:
        description: >-
          Optional Playwright filter to run a single test, e.g.
          "tests/export/some.spec.ts:5". Empty runs the whole suite.
        required: false
        default: ""

env:
  BASE_URL: https://export.miit.uz

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run export tests
        env:
          EXPORT_USERNAME: ${{ secrets.EXPORT_USERNAME }}
          EXPORT_PASSWORD: ${{ secrets.EXPORT_PASSWORD }}
          TYPE: ${{ inputs.type }}
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          # Branch on the test type. frontend is the default and keeps the
          # current behaviour; api/load are placeholders until those suites
          # exist (they fail loudly so a premature dispatch is obvious).
          case "${TYPE:-frontend}" in
            load)
              echo "Load (K6) tests are not configured yet for Export." >&2
              exit 1 ;;
            api)
              echo "API tests are not configured yet for Export." >&2
              exit 1 ;;
            *)
              if [ -n "$TEST_FILTER" ]; then
                # TEST_FILTER may hold several space-separated filters (multi-
                # select in the dashboard). Leave it unquoted so each becomes its
                # own positional arg; Playwright runs any test matching any.
                echo "Running selected tests: $TEST_FILTER"
                npx playwright test $TEST_FILTER
              else
                npx playwright test tests/export
              fi ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
          retention-days: 7

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            cancelled) EMOJI="⚠️" ;;
            *) EMOJI="ℹ️" ;;
          esac
          TEXT="$(printf '%s <b>Export Tests</b> #%s\nResult: <b>%s</b>\nBranch: <code>%s</code>\n%s' \
            "$EMOJI" "$RUN_NUMBER" "$STATUS" "$BRANCH" "$RUN_URL")"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
