name: Export Tests

# Non-default test types append " [type]", automated (non-dashboard) triggers
# append " (CI/CD)", and single-test runs append the filter after " — ", so
# the dashboard can tell apart a full frontend suite run from an api/load run,
# a CI/CD-triggered run, or a single-test run. Defaults → just "Export Tests".
run-name: Export Tests${{ (inputs.type != '' && inputs.type != 'frontend') && format(' [{0}]', inputs.type) || '' }}${{ inputs.triggered_by == 'gitlab-deploy' && ' (CI/CD)' || '' }}${{ inputs.test_filter && format(' — {0}', inputs.test_filter) || '' }}

on:
  # Daily full-suite run. GitHub cron is in UTC; 05:00 UTC = 10:00 Asia/Tashkent
  # (UTC+5, no DST). Scheduled runs only fire from the default branch (main) and
  # pass no test_filter, so the whole suite runs.
  schedule:
    - cron: "0 5 * * *"
  # Manual — runs are also triggered from the dashboard "Run" button
  # (workflow_dispatch).
  workflow_dispatch:
    inputs:
      type:
        description: "Test type to run"
        required: false
        default: "frontend"
        type: choice
        options:
          - frontend
          - api
          - load
          - security
      test_filter:
        description: >-
          For frontend/api: optional Playwright filter to run a single test,
          e.g. "tests/export/some.spec.ts:5". For load: which k6 script to
          run ("load" or "stress"). Empty runs everything for the given type.
        required: false
        default: ""
      triggered_by:
        description: >-
          Internal — set to "gitlab-deploy" by the GitLab deploy pipeline's
          automated trigger. Leave as "manual" when running from the dashboard.
        required: false
        default: "manual"
        type: string
      dashboard_user:
        description: >-
          Internal — set automatically by the dashboard's trigger API to the
          username of whoever clicked Run, so the Telegram notification can
          say who ran it. Leave empty when running from the GitHub UI directly.
        required: false
        default: ""
        type: string

env:
  BASE_URL: https://export.miit.uz

jobs:
  test:
    # The k6 load/stress suite has its own job below — skip this one so we
    # don't waste time installing Playwright/Chromium for a type=load dispatch.
    if: ${{ inputs.type != 'load' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: playwright-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run export tests
        env:
          EXPORT_USERNAME: ${{ secrets.EXPORT_USERNAME }}
          EXPORT_PASSWORD: ${{ secrets.EXPORT_PASSWORD }}
          EXPORT_VIEWER_USERNAME: ${{ secrets.EXPORT_VIEWER_USERNAME }}
          EXPORT_VIEWER_PASSWORD: ${{ secrets.EXPORT_VIEWER_PASSWORD }}
          TYPE: ${{ inputs.type }}
          TEST_FILTER: ${{ inputs.test_filter }}
        run: |
          # Branch on the test type. frontend is the default and keeps the
          # current behaviour.
          case "${TYPE:-frontend}" in
            api)
              if [ -n "$TEST_FILTER" ]; then
                echo "Running selected API tests: $TEST_FILTER"
                npx playwright test --project=export-api $TEST_FILTER
              else
                npx playwright test --project=export-api
              fi ;;
            security)
              # Read-only role-boundary checks (see export-api-security/role-boundaries.spec.ts).
              # Self-skips (not a failure) if EXPORT_VIEWER_* secrets aren't set yet.
              if [ -n "$TEST_FILTER" ]; then
                echo "Running selected security tests: $TEST_FILTER"
                npx playwright test --project=export-api-security $TEST_FILTER
              else
                npx playwright test --project=export-api-security
              fi ;;
            *)
              if [ -n "$TEST_FILTER" ]; then
                # TEST_FILTER may hold several space-separated filters (multi-
                # select in the dashboard). Leave it unquoted so each becomes its
                # own positional arg; Playwright runs any test matching any.
                # --project=export keeps this scoped to the export project even
                # with a path filter — without it, Playwright loads every
                # project's test files (including ones whose credentials aren't
                # set in this job's env) just to build the test list.
                echo "Running selected tests: $TEST_FILTER"
                npx playwright test --project=export $TEST_FILTER
              else
                npx playwright test --project=export
              fi ;;
          esac

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
          retention-days: 7

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
          DASHBOARD_USER: ${{ inputs.dashboard_user }}
          TYPE_RAW: ${{ inputs.type }}
          TEST_FILTER_RAW: ${{ inputs.test_filter }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            cancelled) EMOJI="⚠️" ;;
            *) EMOJI="ℹ️" ;;
          esac
          # Who/what actually kicked this off, in priority order: scheduled
          # cron > the GitLab deploy pipeline's automated trigger > a
          # dashboard user > a bare manual workflow_dispatch from GitHub's UI.
          if [ "$EVENT_NAME" = "schedule" ]; then
            TRIGGER_LINE="Scheduled (daily cron)"
          elif [ "${TRIGGERED_BY:-manual}" = "gitlab-deploy" ]; then
            TRIGGER_LINE="CI/CD (GitLab deploy)"
          elif [ -n "$DASHBOARD_USER" ]; then
            TRIGGER_LINE="Manual — ${DASHBOARD_USER}"
          else
            TRIGGER_LINE="Manual"
          fi
          TEST_TYPE="${TYPE_RAW:-frontend}"
          TEST_DISPLAY="${TEST_FILTER_RAW:-Full suite}"
          TEXT="$(printf '%s <b>Export Tests</b> #%s\nResult: <b>%s</b>\nType: <code>%s</code>\nTest: <code>%s</code>\nTriggered by: %s\nBranch: <code>%s</code>\n%s' \
            "$EMOJI" "$RUN_NUMBER" "$STATUS" "$TEST_TYPE" "$TEST_DISPLAY" "$TRIGGER_LINE" "$BRANCH" "$RUN_URL")"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"

  load_test:
    # k6 load/stress tests against the real API, under the "load" dispatch
    # type. Which script(s) actually run is picked via the existing
    # test_filter input — repurposed here (for this job only) as a k6 script
    # selector ("load" / "stress", and later "spike" / "smoke") rather than a
    # Playwright test filter. Empty test_filter = run every k6 script, same
    # "no filter = whole suite" convention test_filter already has elsewhere.
    # This piggybacks on run-name's existing "— {test_filter}" suffix and
    # mapRun()'s existing parsing, so no schema/mapper changes were needed to
    # add this. Their thresholds are deliberately strict (see
    # export-load-api-test/*.js) and the live API is known to fail them
    # under 30 concurrent users (rate-limited — see README in that folder),
    # so a red run here reflects a real backend limitation, not a broken test.
    if: ${{ inputs.type == 'load' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: export-load-api-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: grafana/setup-k6-action@v1

      - name: Run k6 load test
        if: ${{ inputs.test_filter == '' || inputs.test_filter == 'load' }}
        env:
          EXPORT_USERNAME: ${{ secrets.EXPORT_USERNAME }}
          EXPORT_PASSWORD: ${{ secrets.EXPORT_PASSWORD }}
        run: k6 run load-test.js

      - name: Run k6 stress test
        if: ${{ always() && (inputs.test_filter == '' || inputs.test_filter == 'stress') }}
        env:
          EXPORT_USERNAME: ${{ secrets.EXPORT_USERNAME }}
          EXPORT_PASSWORD: ${{ secrets.EXPORT_PASSWORD }}
        run: k6 run stress-test.js

      - name: Assemble k6 HTML report
        if: always()
        run: |
          mkdir -p k6-report
          [ -f load-report.html ] && mv load-report.html k6-report/ || echo "load-report.html missing (load test crashed before producing a summary)"
          [ -f stress-report.html ] && mv stress-report.html k6-report/ || echo "stress-report.html missing (stress test crashed before producing a summary)"
          # Combined index.html is built by Node from the raw JSON summaries
          # (one flat page, no iframes) rather than copying a static
          # template — see build-report-index.mjs.
          node build-report-index.mjs

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-report
          path: export-load-api-test/k6-report/
          retention-days: 7

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGERED_BY: ${{ inputs.triggered_by }}
          DASHBOARD_USER: ${{ inputs.dashboard_user }}
          TEST_FILTER_RAW: ${{ inputs.test_filter }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping notification."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            cancelled) EMOJI="⚠️" ;;
            *) EMOJI="ℹ️" ;;
          esac
          # load_test only ever runs from workflow_dispatch (see the job's
          # `if:`), never from the schedule trigger — no event_name check needed.
          if [ "${TRIGGERED_BY:-manual}" = "gitlab-deploy" ]; then
            TRIGGER_LINE="CI/CD (GitLab deploy)"
          elif [ -n "$DASHBOARD_USER" ]; then
            TRIGGER_LINE="Manual — ${DASHBOARD_USER}"
          else
            TRIGGER_LINE="Manual"
          fi
          TEST_DISPLAY="${TEST_FILTER_RAW:-Full suite (load + stress)}"
          TEXT="$(printf '%s <b>Export Tests [load]</b> #%s\nResult: <b>%s</b>\nTest: <code>%s</code>\nTriggered by: %s\nBranch: <code>%s</code>\n%s' \
            "$EMOJI" "$RUN_NUMBER" "$STATUS" "$TEST_DISPLAY" "$TRIGGER_LINE" "$BRANCH" "$RUN_URL")"
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}"
